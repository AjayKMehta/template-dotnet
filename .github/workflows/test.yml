name: Run tests

defaults:
  run:
    # bash --noprofile --norc -e(o) pipefail {0}
    shell: bash

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  # github.event.pull_request.number || github.ref: pull request number or branch name if not a pull request
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CHECK_PERMISSIONS: 0
  # Only merge code coverage results if 1
  USE_MERGE: 0
  BUILD_CONFIG: Release

permissions: {}

jobs:
  pre_job:
    name: Check for Duplicate Actions
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.check-duplicate-actions.outputs.should_skip }}
    steps:
      - id: check-permissions
        name: Check action permissions
        uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        if: env.CHECK_PERMISSIONS == '1'
      - id: check-duplicate-actions
        name: Check for duplicate actions
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf # v5.3.1
        with:
          cancel_others: true
          skip_after_successful_duplicate: true
          concurrent_skipping: same_content_newer

  test:
    name: Run Tests
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      TESTINGPLATFORM_DIAGNOSTIC: 1
      TESTINGPLATFORM_DIAGNOSTIC_VERBOSITY: Information
    permissions:
      contents: write # Need to check out code and push changes
      pull-requests: write # Need to update PR

    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        # https://github.com/adamralph/minver?tab=readme-ov-file#why-is-the-default-version-sometimes-used-in-github-actions-azure-pipelines-and-travis-ci-when-a-version-tag-exists-in-the-history
        with:
          fetch-depth: 0
          filter: tree:0
          persist-credentials: true

      - id: filter
        name: Check for changed files
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: .github/filter.yml

      - id: set-env
        name: Set environment variable
        run: |
          if [ "${STEPS_FILTER_OUTPUTS_CODE}" == "true" ] || [ "${STEPS_FILTER_OUTPUTS_TEST}" == "true" ]; then
            echo "ENABLED=1" >> $GITHUB_ENV
          else
            echo "ENABLED=0" >> $GITHUB_ENV
          fi
        env:
          STEPS_FILTER_OUTPUTS_CODE: ${{ steps.filter.outputs.code }}
          STEPS_FILTER_OUTPUTS_TEST: ${{ steps.filter.outputs.test }}

      - id: setup-dotnet
        name: Setup .NET Core
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        if: env.ENABLED == '1'
        with:
          cache: true
          cache-dependency-path: "**/packages.lock.json"
          dotnet-version: 10.0.x

      - id: install-dotnet-coverage
        name: Install dotnet-coverage tool
        if: env.ENABLED == '1'
        run: dotnet tool install -g dotnet-coverage

      - id: pr-check
        name: Check if PR for current commit
        if: env.ENABLED == '1'
        uses: 8BitJonny/gh-get-current-pr@4056877062a1f3b624d5d4c2bedefa9cf51435c9 # 4.0.0
        with:
          # This will work no matter the trigger event and no matter if it is the first PR commit or not.
          sha: ${{ github.event.pull_request.head.sha }}
          # By default it returns PRs in any state.
          filterOutClosed: true
          # By default it returns PRs in any state.
          filterOutDraft: true

      - id: dotnet-restore
        name: Install dependencies
        if: env.ENABLED == '1' && steps.pr-check.outputs.pr_found == 'true'
        run: |
            dotnet restore --force-evaluate && git add .

      - id: commit
        if: env.ENABLED == '1' && steps.pr-check.outputs.pr_found == 'true'
        uses: qoomon/actions--create-commit@7102b1a8b3cb8716dc70dbeb6d774c375d779d2f # v1.2.5
        with:
          message: Committing changes to lock files [skip ci]
          allow-empty: false
          skip-empty: true

      - id: push-changes
        if: env.ENABLED == '1' && steps.pr-check.outputs.pr_found == 'true' && steps.commit.outputs.commit != null
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: git push origin HEAD:$HEAD_REF

      - id: dotnet-restore-locked
        name: Install dependencies
        if: env.ENABLED == '1' && steps.pr-check.outputs.pr_found == 'false'
        run: |
            dotnet restore --locked-mode

      - id: build
        name: Build
        if: env.ENABLED == '1'
        run: dotnet build --configuration $BUILD_CONFIG --no-restore --tl

      - id: test
        name: Test
        if: env.ENABLED == '1'
        run: dotnet test --configuration $BUILD_CONFIG --no-build --verbosity quiet --crashdump --hangdump --hangdump-timeout 10m --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml

      - id: upload-logs
        name: Upload Test Logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: env.ENABLED == '1' && failure() && steps.test.outcome == 'failure'
        with:
          name: test-logs
          path: |
            **/TestResults/**/*.log
          if-no-files-found: warn

      - id: generate-report
        name: Generate codecoverage report
        if: env.ENABLED == '1'
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # 5.5.10
        with:
          reports: '**/TestResults/**/coverage.cobertura.xml'
          # yamllint disable-line
          targetdir: "${{ github.workspace }}/coveragereport"
          reporttypes: Cobertura;MarkdownSummaryGithub;MarkdownAssembliesSummary
          classfilters: -System.*;-Microsoft.*;-Newtonsoft.*;-System.Text.RegularExpressions.*;-xunit.*;-NUnit.*;-TUnit.*

      - id: upload-codecov
        name: Upload code coverage results to codecov
        if: env.ENABLED == '1'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          flags: unittests
          fail_ci_if_error: true
          files: ${{ github.workspace }}/coveragereport/Cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      # https://github.com/danielpalme/ReportGenerator/issues/431
      - id: publish-pr-cov-summary
        name: Publish PR coverage summary
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: steps.pr-check.outputs.pr_found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          hide: true # Hide previous comment
          hide_classify: OUTDATED
          skip_unchanged: true
          number: ${{ steps.pr-check.outputs.number }}
          path: coveragereport/Summary.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: Code coverage

      - id: publish-cov
        name: Publish coverage in build summary
        if: env.ENABLED == '1'
        run: cat $GITHUB_WORKSPACE/coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        shell: bash

      - id: merge-cov
        name: Merge code coverage results
        if: env.USE_MERGE == 1 && env.ENABLED == '1'
        run: dotnet-coverage merge **/*/*.cobertura.xml -f cobertura -o ./cobertura.xml
        shell: bash

        # In v4, Artifacts are immutable (unless deleted). So you must change
        # each of the uploaded Artifacts to have a different name and filter the
        # downloads by name to achieve the same effect
      - id: archive-results
        name: Archive results
        # https://github.com/actions/upload-artifact/blob/main/docs/MIGRATION.md
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: env.ENABLED == '1'
        with:
          name: code-coverage-report-ubuntu
          path: |
            **/TestResults/**/*.cobertura.xml
            coveragereport/*.md
